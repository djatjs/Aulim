spring.application.name=aulim

# MySQL 데이터베이스 설정
# 아래 정보를 사용자 환경에 맞게 수정하세요.
spring.datasource.url=jdbc:mysql://localhost:3306/aulim?useSSL=false&serverTimezone=Asia/Seoul

spring.datasource.username=root
spring.datasource.password=root

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Settings
jwt.secret=your-very-secure-and-long-secret-key-that-is-at-least-32-characters
jwt.expiration=86400000

